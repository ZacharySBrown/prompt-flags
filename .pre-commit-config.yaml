repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-pydantic-boundaries
        name: Check Pydantic at boundaries
        entry: uv run python -m tools.linters.check_pydantic_boundaries
        language: system
        types: [python]
        pass_filenames: false

      - id: check-no-print
        name: Check no print in library code
        entry: uv run python -m tools.linters.check_no_print
        language: system
        types: [python]
        pass_filenames: false

      - id: check-docstrings
        name: Check public docstrings
        entry: uv run python -m tools.linters.check_docstrings
        language: system
        types: [python]
        pass_filenames: false
